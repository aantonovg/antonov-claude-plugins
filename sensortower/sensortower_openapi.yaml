        in: query
        name: app_id
        required: true
        example: '479516143'
        schema:
          type: string
      - description: 'Countries to return results for, separated by commas

          <br>

          <a target=''_blank'' href=''/api/docs/static/country_ids.json''>Country Codes</a>'
        in: query
        name: countries
        explode: false
        example:
        - US
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: 'Types to return results for, separated by commas,

          <a target=''_blank'' href=''/api/docs/static/featured_rankings_types.json''>Types</a>'
        in: query
        name: types
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Start Date, `YYYY-MM-DD` (defaults to 30 days ago)
        in: query
        name: start_date
        example: '2021-02-01'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` (defaults to today)
        in: query
        name: end_date
        example: '2021-02-02'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      type: object
                      properties:
                        country_name:
                          type: string
                          example: US
                        country:
                          type: string
                          example: US
                        category:
                          oneOf:
                          - type: integer
                          - type: string
                            description: The App or Google Play Store category that the specific feature was shown in
                          example: 11
                        type:
                          type: string
                          example: story_list
                        path:
                          type: array
                          items:
                            type: string
                          description: The name of the specific feature section and name of the specific feature list/creative
                          example:
                          - Today
                          - Top Games Right Now
                        creatives:
                          type: array
                          items:
                            type: string
                            description: The url of the feature creative
                          example: []
                        first_seen_at:
                          type: string
                          example:
                        positions:
                          type: array
                          items:
                            type: array
                            items:
                              oneOf:
                              - type: string
                                description: The date of the specific feature
                              - type: array
                                items:
                                  type: integer
                                  description: The ranking or position of the target app for the given feature type and date
                            example:
                            - '2021-10-11'
                            - - 21
                        store_positions:
                          type: array
                          items:
                            type: object
                            properties:
                              date:
                                type: string
                                example: '2021-10-11'
                                description: The date of the specific feature
                              app_position:
                                type: integer
                                example: 21
                                description: The ranking or position of the target app for the given feature type and date
                              section_position:
                                type: integer
                                description: The position in which the specific feature type is located on the App or Google
                                  Play Store on the given date. An indicator of how far a user must scroll before reaching
                                  the feature list
                                example: 2
                        downloads:
                          type: integer
                          description: The number of total downloads attributed to the specific feature for the selected time
                            period
                          example: 32
                        downloads_share:
                          type: number
                          format: float
                          description: The percentage of total downloads from all featurings that are attributed to the specific
                            feature
                          example: 1.75
                        feature_downloads:
                          type: array
                          items:
                            type: array
                            items:
                              oneOf:
                              - type: string
                                description: The date of the specific feature
                              - type: integer
                                description: The number of downloads attributed to the specific feature for the given date
                            example:
                            - '2021-10-11'
                            - 4
                        occurrences:
                          type: integer
                          description: The number of times that the target app appeared in the specific feature during the
                            selected time period
                          example: 8
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
