            application/json:
              example: "[\n  {\n    \"app_id\": 1234567890,\n    \"country\": \"US\",\n    \"date\": \"2024-01-01T00:00:00Z\"\
                ,\n    \"iphone_app_store_views\": 15,\n    \"iphone_app_impressions\": 918,\n    \"iphone_app_units\": 3,\n\
                \    \"iphone_paying_users\": 0,\n    \"iphone_in_app_purchases\": 0,\n    \"iphone_installations\": 3,\n\
                \    \"iphone_sessions\": 39,\n    \"iphone_active_devices\": 17,\n    \"ipad_app_store_views\": 2,\n    \"\
                ipad_app_impressions\": 304,\n    \"ipad_app_units\": 0,\n    \"ipad_paying_users\": 0,\n    \"ipad_in_app_purchases\"\
                : 0,\n    \"ipad_installations\": 1,\n    \"ipad_sessions\": 3,\n    \"ipad_active_devices\": 2,\n    \"ipod_app_store_views\"\
                : 0,\n    \"ipod_app_impressions\": 0,\n    \"ipod_app_units\": 0,\n    \"ipod_paying_users\": 0,\n    \"\
                ipod_in_app_purchases\": 0,\n    \"ipod_installations\": 0,\n    \"ipod_sessions\": 0,\n    \"ipod_active_devices\"\
                : 0\n  }\n]\n"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/ios/sales_reports/sources_metrics:
    get:
      tags:
      - 'CONNECTED APPS: My App Analytics'
      description: Retrieve a detailed app store report by traffic source type, country and date. Currently only available
        for Search source type metrics (app units and impressions).
      operationId: sales_reports_sources_metrics
      summary: Fetches App Store metrics by Source Type of your apps.
      parameters:
      - description: App IDs of apps that you currently manage, separated by commas
        in: query
        name: app_ids
        required: true
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: "Specify the countries you want report for, <a target='_blank' href='/api/ios/sales_reports/countries.json'>\n\
          \  Itunes Country Codes\n</a>"
        in: query
        name: countries
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2024-01-10'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2024-01-20'
        schema:
          type: string
          format: date
      - description: Limit, maximum number of reports to retrieve, maximum of 6000.
        in: query
        name: limit
