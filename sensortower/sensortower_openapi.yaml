  /v1/ios/sales_reports/analytics_metrics:
    get:
      tags:
      - 'CONNECTED APPS: My App Analytics'
      description: Retrieve a detailed app store analytics report of your apps by country and date, with information such
        as app impressions, app store views, in-app purchases, sessions, and active devices.
      operationId: sales_reports_analytics_metrics
      summary: Fetches App Store analytics report of your apps.
      parameters:
      - description: App IDs of apps that you currently manage, separated by commas
        in: query
        name: app_ids
        required: true
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: "Specify the countries you want download / revenue for, <a target='_blank' href='/api/ios/sales_reports/countries.json'>\n\
          \  Itunes Country Codes\n</a>, <a target='_blank' href='/api/android/sales_reports/countries.json'>\n  Android Country\
          \ Codes\n</a>, separated by commas"
        in: query
        name: countries
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2021-01-10'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2021-01-20'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
