      - description: Specify the countries you want download / revenue for, <a target='_blank' href='/api/unified/sales_reports/countries.json'>Country
          Codes</a>, separated by commas (use "WW" for all countries)
        in: query
        name: countries
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Aggregate estimates by granularity (use "daily", "weekly", "monthly", or "quarterly") defaults to "daily"
        in: query
        name: date_granularity
        required: true
        schema:
          default: daily
          enum:
          - daily
          - weekly
          - monthly
          - quarterly
          type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2024-01-10'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2024-01-20'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              example: "[\n  {\n    \"unified_app_id\": \"61c25dc864df7d6b51498ab9\",\n    \"itunes_apps\": [\n      {\n \
                \       \"app_id\": 1234567890,\n        \"country\": \"US\",\n        \"date\": \"2023-01-09T00:00:00Z\"\
                ,\n        \"ipad_units\": 20,\n        \"ipad_revenue\": 140,\n        \"iphone_units\": 100\n      }\n \
                \   ],\n    \"android_apps\": [\n      {\n        \"app_id\": \"com.example.app\",\n        \"country\": \"\
                US\",\n        \"date\": \"2023-01-09T00:00:00Z\",\n        \"daily_user_installs\": 2500,\n        \"daily_device_installs\"\
                : 2200\n      }\n    ],\n    \"aggregated\": [\n      {\n        \"ipad_units\": 20,\n        \"ipad_revenue\"\
                : 140,\n        \"iphone_units\": 100,\n        \"daily_user_installs\": 2500,\n        \"daily_device_installs\"\
                : 2200,\n        \"country\": \"US\",\n        \"date\": \"2023-01-09T00:00:00Z\"\n      }\n    ]\n  }\n]\n"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/api_usage:
    get:
      tags:
      - 'API USAGE: API Usage'
      description: 'Retrieve API Usage for a given period for a user and their organization. <br> Additionally, monthly API
        limit and API tier (if present) will be returned.

        '
      operationId: api_usage
      summary: Fetches API usage for a given period.
      parameters:
      - description: Optional date to check monthly usage for as an ISO 8601 string (yyyy-mm-dd). The month will be extracted
          from this, truncating the day of the month. When omitted, defaults to the current month.
        in: query
        name: date
        required: false
        schema:
          type: string
          description: YYYY-MM-DD Date.
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    description: Organization data
                    type: object
                    properties:
                      limit:
                        description: Current (not historical) API request limit
                        type: integer
                      tier:
                        description: API tier (if set)
                        type: string
                      usage:
                        description: API request usage
                        type: integer
                      data_points:
                        description: Information about API data points usage, if available
                        type: object
                        properties:
                          limit:
                            description: Current (not historical) API data points limit
                            type: integer
                          usage:
                            description: API data points usage
                            type: integer
                  user:
                    description: User's API token data
                    type: object
                    properties:
                      usage:
                        description: API request usage
                        type: integer
                      usage_data_points:
                        description: API data points usage
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  responses:
    Unauthorized:
      description: <strong>Invalid authentication token.</strong> <br> Generate an API authentication token on your <a target="_blank"
        href="https://app.sensortower.com/users/edit/api-settings">account profile (API Settings tab)</a> and ensure that
        your organization has access to this product. <br> Please contact the Sensor Tower team for more information.
      content:
        application/json:
          schema:
            properties:
              error:
                type: string
                example: Invalid authentication token.
            required:
            - error
            type: object
    Forbidden:
      description: <strong>Forbidden.</strong> <br> Your API token is not valid. <br> If you lost your API token you can generate
        a new one on your <a target="_blank" href="https://app.sensortower.com/users/edit/api-settings">account profile (API
        Settings tab)</a> or contact the Sensor Tower team for more information.
      content:
        application/json:
          schema:
            properties:
              error:
                type: string
                example: Your API token is not authorized.
            required:
            - error
            type: object
    UnprocessableEntity:
      description: <strong>Invalid Query Parameter.</strong> <br> Please check that all required params are present and valid.
      content:
        application/json:
          schema:
            properties:
              errors:
                items:
                  type: object
                  properties:
                    title:
                      type: string
                      example: 'Required parameter: name is missing'
                  required:
                  - title
                type: array
            required:
            - errors
            type: object
  securitySchemes:
    auth_token:
      type: apiKey
      description: API authentication token. You can generate yours on your <a target="_blank" href="/users/edit/api-settings">account
        profile (API Settings tab)</a>.
      name: auth_token
      in: query
