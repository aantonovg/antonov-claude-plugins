  /v1/{os}/downloads_by_sources:
    get:
      tags:
      - 'ACQUISITION & CHURN: Downloads by Source'
      description: 'Fetch percentages and absolute values for all three download sources: organic, paid, and browser. <br>
        Regardless of the OS parameter, this endpoint only accepts Unified app IDs and returns data grouped by Unified app
        IDs.'
      operationId: downloads_by_sources
      summary: Fetches app downloads by sources
      parameters:
      - description: Operating System. This parameter doesn't affect app_ids. It always expects Unified apps IDs. <br> If
          "Android" or "iOS" is selected, only apps from this platform will be taken into account.
        in: path
        name: os
        required: true
        schema:
          default: unified
          enum:
          - ios
          - android
          - unified
          type: string
      - description: Unified app IDs, separated by commas
        in: query
        name: app_ids
        required: true
        explode: false
        example:
        - 55c5027502ac64f9c0001fa6
        schema:
          items:
            default: ''
            type: string
          type: array
      - description: Country codes, separated by commas. For worldwide data, use 'WW'. <br> Note that this product leverages
          the set of worldwide countries available in Google Play, which notably excludes China. <br> <a target='_blank' href='/api/docs/static/country_ids.json'>Country
          Codes</a>.
        in: query
        name: countries
        required: true
        example:
        - WW
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Aggregate estimates by granularity (use "daily" or "monthly"). Defaults to "monthly".
        in: query
        name: date_granularity
        required: false
        schema:
          default: monthly
          enum:
          - daily
          - monthly
          type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2023-01-01'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2023-02-28'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        app_id:
                          type: string
                          description: Unified App ID
                        breakdown:
                          type: array
                          items:
                            type: object
                            properties:
                              date:
                                type: string
                                format: date
                                description: First day of described month
                              organic_abs:
                                type: number
                                description: Number of organic downloads
                              browser_abs:
                                type: number
                                description: Number of browser downloads
                              paid_abs:
                                type: number
                                description: Number of paid downloads
                              organic_frac:
                                type: number
                                description: Fraction of organic downloads, ≤ 1.0
                              browser_frac:
                                type: number
                                description: Fraction of browser downloads, ≤ 1.0
                              paid_frac:
                                type: number
                                description: Fraction of paid downloads, ≤ 1.0
              example:
                data:
                - app_id: 55c5027502ac64f9c0001fa6
                  breakdown:
                  - date: '2022-02-01'
                    organic_abs: 165995
                    browser_abs: 2677
                    paid_abs: 13430
                    organic_frac: 0.91154
                    browser_frac: 0.0147
                    paid_frac: 0.07376
                  - date: '2022-03-01'
                    organic_abs: 133189
                    browser_abs: 9242
                    paid_abs: 22630
                    organic_frac: 0.8069
                    browser_frac: 0.05599
                    paid_frac: 0.13711
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/consumer_intel/churn_analysis:
    get:
      tags:
      - 'ACQUISITION & CHURN: Acquisition & Churn'
      description: 'Fetches app churn rate as well as active user breakdown metrics (percentage of new, resurrected, and retained
        users). <br> <br> <strong>Note:</strong> There may be gaps in the data in which case null values will be given.

        '
      operationId: churn_analysis
      summary: Fetches churn analysis.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: android
          enum:
          - android
          type: string
      - description: "IDs of selection cohorts, separated by commas. (Max: 5) <br> Can be queried with <a href=\"/api/docs/app_analysis#/ACQUISITION%20%26%20CHURN%3A%20Acquisition%20%26%20Churn/churn_analysis_cohorts\"\
          \ target=\"_blank\">\n  Churn Analysis Cohorts\n</a>\n"
        in: query
        name: selection_cohort_ids
        required: true
        example:
        - cohort_85b0b0a055f66ee9d9461187
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Country to return results for (leave blank for Worldwide)
        in: query
        name: country
        required: false
        schema:
          type: string
          enum:
          - LATIN_AM
          - SE_ASIA
          - TIER_1
          - US
      - description: Churn Analysis by granularity
        in: query
        name: granularity
        required: true
        schema:
          default: monthly
          enum:
          - monthly
          type: string
      - description: 'Start Date, `YYYY-MM-DD` Format (minimum date: 2020-05-01)'
        in: query
        name: start_date
        required: true
        schema:
          default: '2020-05-01'
          format: date
          type: string
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        schema:
          default: '2020-05-31'
          format: date
          type: string
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    items:
                      type: object
                      required:
                      - active_user_breakdown
                      - selection_cohort_id
                      properties:
                        active_user_breakdown:
                          items:
                            type: object
                            required:
                            - date
                            - new_users_ratio
                            - resurrected_users_ratio
                            - retained_users_ratio
                            - churned_users_ratio
                            properties:
                              date:
                                format: date
                                type: string
                              new_users_ratio:
                                type: number
                              resurrected_users_ratio:
                                type: number
                              retained_users_ratio:
                                type: number
                              churned_users_ratio:
                                type: number
                        selection_cohort_id:
                          type: string
                    type: array
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
