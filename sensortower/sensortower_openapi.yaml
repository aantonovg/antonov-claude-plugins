  /v1/apps/timeseries/unified_apps:
    get:
      tags:
      - 'USAGE: Session Metrics (Time Spent, Session Count)'
      description: "Retrieve session metrics data across a time series for Unified Apps. <br> <i>Note: An optional OS filter\
        \ is available, but responses are aggregated by unified app.</i> <br><br> Supported metrics include:\n  - time_spent\
        \ (seconds)\n  - total_time_spent (seconds)\n  - session_duration (seconds)\n  - session_count\n  - total_session_count"
      operationId: unified_session_metrics_timeseries
      summary: Fetch time series data for unified apps.
      parameters:
      - description: Start date in `YYYY-MM-DD` format. Data is available from 2021-01-01 onward.
        in: query
        name: start_date
        required: true
        schema:
          default: '2023-01-01'
          format: date
          type: string
      - description: End date in `YYYY-MM-DD` format.
        in: query
        name: end_date
        required: true
        schema:
          default: '2023-02-01'
          format: date
          type: string
      - description: Unified app IDs, separated by commas (maximum 100).
        in: query
        name: app_ids
        required: true
        explode: false
        schema:
          type: array
          maxItems: 100
          items:
            default: ''
            type: string
        example:
        - 56cbbce9d48401b048003405
      - description: Time series metrics, separated by commas.
        in: query
        name: timeseries
        required: true
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - time_spent
            - total_time_spent
            - session_duration
            - session_count
            - total_session_count
        example:
        - date
        - time_spent
        - total_time_spent
        - session_duration
        - session_count
        - total_session_count
      - description: 'Regions, separated by commas. All regions are included unless specified. <a target=''_blank'' href=''/api/ios/usage/countries.json''>Region
          Codes</a>.

          '
        in: query
        name: regions
        explode: false
        example:
        - US
        - FR
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: 'Specifies the session metrics time period.<br> Returns averaged session metrics for each period within
          a month.<br> Example: "week" = average session metrics per week, averaged over all weeks in a month.

          '
        name: time_period
        in: query
        example: week
        schema:
          type: string
          enum:
          - day
          - week
          - month
      - description: Filter apps by platform.
        name: os
        in: query
        schema:
          type: string
          enum:
          - ios
          - android
      - description: 'Fields used for data aggregation, separated by commas.<br> The specified fields will be preserved in
          the response, while others will be aggregated.

          '
        in: query
        name: breakdown
        required: true
        explode: false
        schema:
          default: unified_app_id
          type: string
          enum:
          - unified_app_id
          - unified_app_id,region
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              examples:
                unified_apps:
                  value: "{\n  \"unified_apps\": [\n    {\n      \"unified_app_id\": \"56cbbce9d48401b048003405\",\n     \
                    \ \"timeseries\": [\n        {\n          \"date\": \"2023-01-01\",\n          \"time_spent\": 26551.594982,\n\
                    \          \"total_time_spent\": 13149282008467.77,\n          \"session_duration\": 314.498895,\n   \
                    \       \"session_count\": 84.423601,\n          \"total_session_count\": 41809463799.98541\n        },\n\
                    \        {\n          \"date\": \"2023-02-01\",\n          \"time_spent\": 26687.15766,\n          \"\
                    total_time_spent\": 11783512999576.81,\n          \"session_duration\": 317.313704,\n          \"session_count\"\
                    : 84.108839,\n          \"total_session_count\": 37137461193.58957\n        }\n      ]\n    }\n  ]\n}\n"
                unified_apps,regions:
                  value: "{\n  \"data\": [\n    {\n      \"region\": \"FR\",\n      \"unified_app_id\": \"56cbbce9d48401b048003405\"\
                    ,\n      \"timeseries\": [\n        {\n          \"date\": \"2023-01-01\",\n          \"time_spent\":\
                    \ 28356.701845,\n          \"total_time_spent\": 1592352400347.679,\n          \"session_duration\": 309.800029,\n\
                    \          \"session_count\": 91.531935,\n          \"total_session_count\": 5139936245.374954\n     \
                    \   }\n      ]\n    },\n    {\n      \"region\": \"US\",\n      \"unified_app_id\": \"56cbbce9d48401b048003405\"\
                    ,\n      \"timeseries\": [\n        {\n          \"date\": \"2023-01-01\",\n          \"time_spent\":\
                    \ 26319.5797,\n          \"total_time_spent\": 11557256934075.45,\n          \"session_duration\": 315.164501,\n\
                    \          \"session_count\": 83.510661,\n          \"total_session_count\": 36670554241.42146\n     \
                    \   }\n      ]\n    }\n  ]\n}\n"
        '401':
          $ref: '#/components/responses/Unauthorized'
