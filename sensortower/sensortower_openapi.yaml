      - description: Field name (leading or trailing spaces will be removed)
        in: query
        name: name
        required: true
        example: Test field
        schema:
          type: string
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
