        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/custom_field/remove_custom_field:
    post:
      tags:
      - 'CUSTOM FIELDS: Edit Custom Fields Data'
      description: Delete all instances of a custom field, for all apps or tag values it has been assigned to. This functionality
        is destructive. Be careful!
      operationId: remove_custom_field
      summary: Remove a custom field.
      parameters:
      - description: Field name (leading or trailing spaces will be removed)
        in: query
        name: name
        required: true
        example: Test field
        schema:
          type: string
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/custom_fields_filter:
    post:
      tags:
      - 'CUSTOM FIELDS: Custom Fields Filter ID'
      summary: Create a custom fields filter.
      description: 'Create a filter ID and use it to query other endpoints by custom filters. <br> Use "fields_values" endpoint
        to get a list of possible custom fields and values.

        '
      operationId: create_custom_fields_filter
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                properties:
                  custom_fields_filter_id:
                    type: string
                required:
                - custom_fields_filter_id
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
      requestBody:
        content:
          application/json:
            schema:
              default:
                custom_fields:
                - exclude: false
                  global: true
                  name: Free
                  values:
                  - 'true'
              properties:
                custom_fields:
                  type: array
                  items:
                    type: object
                    properties:
                      exclude:
                        description: If set, filter will exclude passed values
                        type: boolean
                      global:
                        type: boolean
                      name:
                        type: string
                      values:
                        items:
                          type: string
                        type: array
                    required:
                    - name
                    - global
                    - values
              required:
              - custom_fields
              type: object
        description: JSON
        required: true
  /v1/custom_fields_filter/{id}:
    get:
      tags:
      - 'CUSTOM FIELDS: Custom Fields Filter ID'
