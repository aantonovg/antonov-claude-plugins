        \  <tr>\n    <td>app_id</td>\n    <td>App being compared (result app)</td>\n  </tr>\n  <tr>\n    <td>app_a_users_likelihood_multiplier</td>\n\
        \    <td>\n      Requested app's users increased chance of use of result app.\n    </td>\n  </tr>\n  <tr>\n    <td>app_a_users_using_app_b_share</td>\n\
        \    <td>Percentage of requested app users which also use result app</td>\n  </tr>\n  <tr>\n    <td>app_a_users_using_app_b_share_previous_period</td>\n\
        \    <td>Percentage of requested app users which also use result app in the previous period</td>\n  </tr>\n  <tr>\n\
        \    <td>app_a_users_using_app_b_share_previous_period_diff</td>\n    <td>Percentage of requested app users which\
        \ also use result app – difference between the current period and the previous</td>\n  </tr>\n  <tr>\n    <td>app_b_users_likelihood_multiplier</td>\n\
        \    <td>\n      Result app's users increased chance of use of requested app.\n      <br>This field is only present\
        \ if the `include_inverse_multiplier` parameter is set to `true`.  \n    </td>\n  </tr>\n</table>"
      parameters:
      - description: The ID of the reference Unified App. If it belongs to an app that does not meet <a target='_blank' href='https://help.sensortower.com/hc/en-us/articles/6985667275675-What-is-a-Disabled-Small-App-in-Usage-Intelligence-'>
          minimum requirements for usage estimates</a>, an error will be returned.
        in: query
        name: app_id
        required: true
        example: 55c530a702ac64f9c0002dff
        schema:
          type: string
      - description: 'Country to return results for. The allowed countries are the following: US, AU, CA, FR, DE, GB, IT,
          JP, KR, BR, IN,  ID, MY, SG, ES, TH, VN, CN, TW, HK, RU, TR, MX, PL, NL, PH, SA, AE. <br> Only single countries
          are supported at this time. Passing multiple countries in one request will cause an error.

          '
        in: query
        name: countries
        required: true
        explode: true
        collectionFormat: multi
        schema:
          type: array
          items:
            default: ''
            type: string
        example:
        - US
      - description: Start of the date range to query, `YYYY-MM-DD` Format. Must be the first day of the month.
        in: query
        name: start_date
        required: true
        example: '2023-01-01'
        schema:
          type: string
          format: date
      - description: End of the date range to query, `YYYY-MM-DD` Format. Must be the last day of the month.
        in: query
        name: end_date
        required: true
        example: '2023-01-31'
        schema:
          type: string
          format: date
      - description: 'Unified Category ID for the result apps.

          <b>Omit this parameter to select all categories.</b>'
        in: query
        name: category
        explode: false
        schema:
          type: string
      - description: 'Whether to include the inverse likelihood multiplier metric (result app''s users increased chance of
          use of the requested app).

          The metric is returned in the `app_a_users_likelihood_multiplier` field.

          If this parameter is omitted, the field is not included in the response.'
        in: query
        name: include_inverse_multiplier
        required: false
        example: true
        schema:
          type: boolean
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              example:
                data:
                - app_id: 55c51be002ac64f9c00027e7
                  app_a_users_likelihood_multiplier: 29.0889949798584
                  app_a_users_using_app_b_share: 0.0714285746216774
                  app_a_users_using_app_b_share_previous_period: 0.05298013240098953
                  app_a_users_using_app_b_share_previous_period_diff: 0.01844844222068787
                  app_b_users_likelihood_multiplier: 28.0239546796584
                - app_id: 63b2a4b14070f25948d81cdc
                  app_a_users_likelihood_multiplier: 28.1655330657959
                  app_a_users_using_app_b_share: 0.02380952425301075
                  app_a_users_using_app_b_share_previous_period: 0
                  app_a_users_using_app_b_share_previous_period_diff: 0.02380952425301075
                  app_b_users_likelihood_multiplier: 29.0343435534384
                - app_id: 537bf579830f782dbe00de46
                  app_a_users_likelihood_multiplier: 26.09453773498535
                  app_a_users_using_app_b_share: 0.01785714365541935
                  app_a_users_using_app_b_share_previous_period: 0
                  app_a_users_using_app_b_share_previous_period_diff: 0.01785714365541935
                  app_b_users_likelihood_multiplier: 26.59433373349843
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/search_entities:
    get:
      tags:
      - 'APP AND PUBLISHER METADATA: Search Entities'
      description: Search for apps and publishers that contain certain words or phrases in their name, description, subtitle,
        promo text and in-app purchases. <br> You can also find an app by ID or Unified ID. <br> <br> <strong>Deprecation:</strong>
        <code>valid_countries</code>, <code>publisher_ids</code>, <code>global_rating_count</code> on top level of response  if
        `os` = unified, `entity_type` = app
      operationId: get_search_entities
      summary: Find apps or publishers from a search term.
      parameters:
      - description: Platform
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          - both_stores
          - unified
          type: string
      - description: App or Publisher
        in: query
        name: entity_type
        required: true
        schema:
          default: app
          enum:
          - app
          - publisher
          type: string
      - description: 'Search term (Minimum Characters: 2 non-Latin or 3 Latin)'
        in: query
        name: term
        required: true
        example: Lyft
        schema:
          type: string
      - description: 'Limit how many apps returned per call (Max: 250)'
        in: query
        name: limit
        schema:
          default: 100
          type: integer
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/apps/app_ids:
    get:
      tags:
      - 'APP AND PUBLISHER METADATA: App and Publisher Metadata'
      description: 'Retrieve a list of 10,000 (or less) App IDs <strong>starting</strong> from the specified release date
        and specified updated date. You will also receive the date range (release date) of the App IDs returned <br><br> <strong>Note:</strong>
        As the offset gets large, the amount of time for the server to respond will increase. In these circumstances, it may
        be better to use the start date parameter.

        '
      operationId: app_ids
      summary: Fetches app IDs from a given release/updated date in a particular category.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          type: string
      - description: "ID of the Category, <a target='_blank' href='/api/docs/static/category_ids.json'>\n  Category Ids\n\
          </a>"
        in: query
        name: category
        required: true
        schema:
          type: string
        examples:
          ios:
            value: 6005
            summary: Social Networking (iOS)
          android:
            value: business
            summary: Business (Android)
      - description: Minimum Start Date, `YYYY-MM-DD` format
        in: query
        name: start_date
        schema:
          format: date
          type: string
      - description: Minimum Updated Date, `YYYY-MM-DD` format
        in: query
        name: updated_date
        schema:
          format: date
          type: string
      - description: Number of App IDs to offset the results by
        in: query
        name: offset
        schema:
          type: integer
      - description: 'Limit how many App IDs per call (defaults to maximum: 10,000)'
        in: query
        name: limit
        schema:
          default: 1000
          type: integer
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/publisher/publisher_apps:
    get:
      tags:
      - 'APP AND PUBLISHER METADATA: App and Publisher Metadata'
      description: Retrieves a collection of Apps for the specified Publisher.
      operationId: get_publisher_apps
      summary: Fetches apps for a particular publisher.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          type: string
      - description: Fetches apps for a given Publisher.
        in: query
        name: publisher_id
        required: true
        examples:
          ios:
            value: '368677371'
            summary: integer (iOS)
          android:
            value: Facebook
            summary: string (Android)
        schema:
          type: string
      - description: Limits number of apps returned per call.  Max 100 apps per call.
        in: query
        name: limit
        schema:
          default: 20
          type: integer
      - description: Number of apps to offset the results by.
        in: query
        name: offset
        schema:
          default: 0
          type: integer
      - description: Includes count of publisher apps in response payload.<br> <strong>Note:</strong> setting this to true
          changes the output structure of the API response.
        in: query
        name: include_count
        schema:
          default: false
          type: boolean
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/unified/publishers/apps:
    get:
      tags:
      - 'APP AND PUBLISHER METADATA: App and Publisher Metadata'
      description: "Retrieve unified publisher and all of it's unified apps together with platform-specific apps. Result contains\
        \ only names and IDs. <br><br> See here for further information on unification: <a target='_blank' href='https://help.sensortower.com/hc/en-us/articles/6983248425499-How-is-iOS-and-Android-data-unified-'>\
        \ How is iOS and Android data unified?</a> <br><br> Supports two ways to find relevant publisher: <ol>\n  <li>By unified\
        \ publisher ID</li>\n  <li>By unified app ID</li>\n</ol> <strong>Note:</strong> Result format doesn't depend on what\
        \ entity was used in query parameter. In both cases unified publisher is returned as root entity. <br><br>\n"
      operationId: unified_publisher_apps
      summary: Fetches unified publisher and all of it's apps.
      parameters:
      - description: Unified App ID or unified Publisher ID
        in: query
        name: unified_id
        required: true
        example: 560c48b48ac350643900b82d
        schema:
          type: string
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/unified/apps:
    get:
      tags:
      - 'APP AND PUBLISHER METADATA: App and Publisher Metadata'
      description: 'Retrieve unified, iOS and Android app IDs and publisher IDs that are

        associated together, as well as the unified app name.

        <br><br>

        See here for further information on unification: <a target=''_blank''

        href=''https://help.sensortower.com/hc/en-us/articles/6983248425499-How-is-iOS-and-Android-data-unified-''>

        How is iOS and Android data unified?</a>

        <br><br>

        <strong>Note:</strong> If two app_ids queried belong to the same unified app, only

        one unified app object will be returned. Furthermore, if no unified

        apps matches the app_ids queried, an empty array will be returned.

        '
      operationId: unified_apps
      summary: Fetches iOS/Android app IDs of unified apps.
      parameters:
      - description: Operating System
        in: query
        name: app_id_type
        required: true
        schema:
          enum:
          - unified
          - itunes
          - android
          type: string
      - description: App IDs of apps, separated by commas (limited to 100)
        in: query
        name: app_ids
        required: true
        explode: false
        examples:
          unified:
            value:
            - 55c5025102ac64f9c0001f96
            - 55c503be02ac64f9c000203c
            summary: string (Unified)
          ios:
            value:
            - '284882215'
            summary: integer (iOS)
          android:
            value:
            - com.facebook.katana
            summary: string (Android)
        schema:
          type: array
          items:
            default: ''
            type: string
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/unified/publishers:
    get:
      tags:
      - 'APP AND PUBLISHER METADATA: App and Publisher Metadata'
      description: 'Retrieve unified, iTunes, and android publisher IDs that are associated together. <br><br> See here for
        further information on unification: <a target=''_blank'' href=''https://help.sensortower.com/hc/en-us/articles/6983248425499-How-is-iOS-and-Android-data-unified-''>
        How is iOS and Android data unified?</a> <br><br> <strong>Note:</strong> If two publisher_ids queried belong to the
        same unified publisher, only one unified publisher object will be returned. Furthermore, if no unified publishers
        matches the publisher_ids queried, an empty array will be returned. <br><br> Some Android publisher IDs contain commas.
        If you want to query by these publisher IDs, please use the <b>array parameter format</b> instead of the comma separated
        format. (I.e. <code>?publisher_ids[]=AndroidPubId1&publisher_ids[]=AndroidPubId2&publisher_ids[]=...</code>)

        '
      operationId: unified_publishers
      summary: Fetches iOS/Android publisher IDs for unified publishers.
      parameters:
      - description: Operating System
        in: query
        name: publisher_id_type
        required: true
        schema:
          enum:
          - unified
          - itunes
          - android
          type: string
      - description: Publisher IDs of publishers, separated by commas (limited to 100)
        in: query
        name: publisher_ids
        required: true
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
        example:
        - 5614b32f3f07e2077c000488
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/app_tag/tags_for_apps:
    get:
      tags:
      - 'CUSTOM FIELDS: Retrieve Custom Fields Data'
      description: 'Retrieve a list of global/custom field names and associated tag values for requested apps. <br> Supports
        requesting specific field names or tag groups by product name.

        '
      operationId: tags_for_apps
      summary: Fetches global or custom fields and tag values of apps.
      parameters:
      - description: 'IDs of apps (iTunes or Android IDs), separated by commas. (max 100) <br> Apps without tags will not
          be included in the response.

          '
        in: query
        name: app_ids
        required: true
        explode: false
        examples:
          ios:
            value:
            - '284882215'
            - '310633997'
            summary: integer (iOS)
          android:
            value:
            - com.facebook.katana
            summary: string (Android)
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: 'List of field categories which should be returned in response. See <a target="_blank" href="/api/custom_field/categories.json">complete
          list</a> of categories and related fields.

          '
        in: query
        name: field_categories
        example:
        - downloads
        explode: true
        schema:
          type: array
          items:
            type: string
            enum:
            - active_users
            - advertising
            - app_content
            - app_metadata
            - app_ratings
            - app_release_and_updates
            - custom_fields
            - demographics
            - developer_integrations
            - downloads
            - gaming
            - monetization
            - publisher_details
            - retention
            - revenue
      - description: 'List of fields which should be returned in response.

          Both custom and global field names can be requested.

          Can be used together with "field_categories" parameter.

          '
        in: query
        name: fields
        example:
        - Free
        - Primary Category
        explode: true
        schema:
          type: array
          items:
            default: ''
            type: string
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
