  /v1/{os}/sales_report_estimates:
    get:
      tags:
      - 'PERFORMANCE: Downloads & Revenue'
      description: "Retrieve download and revenue estimates of apps by country and date. <a target='blank' href='/api/docs/static/sales_report_estimates_key.json'>\n\
        \  Download / Revenue Estimate Response Key\n</a> <br><br> <strong>Note:</strong> The latest day's available Google\
        \ Play estimates may change. More data becomes available to us a day later and we use this data to recalibrate the\
        \ estimate for increased accuracy. <br><br> <b>At least one app ID, or one publisher ID is required.</b> Some Android\
        \ publisher IDs contain commas. If you want to query by these publisher IDs, please use the <b>array parameter format</b>\
        \ instead of the comma separated format. (I.e. <code>?publisher_ids[]=AndroidPubId1&publisher_ids[]=AndroidPubId2&publisher_ids[]=...</code>)\
        \ <br><br> There are times when the API will timeout or return an <b>Internal Server Error</b> response.  When this\
        \ occurs, it is recommended to segment the query by <b>start_date</b> and <b>end_date</b> depending on the <b>date_granularity</b>\
        \ as follows: <br> <table>\n  <tr>\n    <td><b>date_granularity</b></td>\n    <td><b>Recommendation</b></td>\n  </tr>\n\
        \  <tr>\n    <td>daily</td>\n    <td>limit start_date and end_date to 1 week segments</td>\n  </tr>\n  <tr>\n    <td>weekly</td>\n\
        \    <td>limit start_date and end_date to 3 month segments</td>\n  </tr>\n  <tr>\n    <td>monthly</td>\n    <td>limit\
        \ start_date and end_date to 1 year segments</td>\n  </tr>\n  <tr>\n    <td>quarterly</td>\n    <td>limit start_date\
        \ and end_date to 2 year segments</td>\n  </tr>\n</table> <br><br> <strong>Note:</strong> All revenues are returned\
        \ in cents."
      operationId: sales_report_estimates
      summary: Fetches download and revenue estimates of apps and publishers.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          - unified
          type: string
      - description: IDs of apps, separated by commas
        in: query
        name: app_ids
        explode: false
        example:
        - '284882215'
        - '310633997'
        schema:
          items:
            default: ''
            type: string
          type: array
      - description: 'Publisher IDs of apps, separated by commas <span style=''color: #FF0000''>(See implementation notes
          for specific implementations regarding Android publisher IDs)</span>'
        in: query
        name: publisher_ids
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Specify the countries you want download / revenue for, <a target='_blank' href='/api/docs/static/country_ids.json'>Country
          Codes</a>, separated by commas (use "WW" for worldwide)
        in: query
        name: countries
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Aggregate estimates by granularity (use "daily", "weekly", "monthly", or "quarterly") defaults to "daily"
        in: query
        name: date_granularity
        required: true
        schema:
          default: daily
          enum:
          - daily
          - weekly
          - monthly
          - quarterly
          type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2021-07-15'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2021-07-20'
        schema:
          type: string
          format: date
      - description: Specify the data model used to generate estimates. Use "DM_2025_Q1" to access Sensor Tower’s legacy estimates,  or
          "DM_2025_Q2" to access estimates produced by our new, improved models. Access to this parameter is limited to eligible
          accounts. If you believe you should have access, please contact your Account Director.
        in: query
        name: data_model
        required: false
        schema:
          default: DM_2025_Q2
          enum:
          - DM_2025_Q2
          - DM_2025_Q1
          type: string
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  description: iOS Response
                  items:
                    properties:
                      aid:
                        type: number
                        description: The iOS app ID.
                      cc:
                        type: string
                        description: Country code.
                      d:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      iu:
                        type: string
                        description: iPhone Downloads
                      ir:
                        type: string
                        description: iPhone Revenue
                      au:
                        type: string
                        description: iPad Downloads
                      ar:
                        type: string
                        description: iPad Revenue
                - type: array
                  description: Android Response
                  items:
                    properties:
                      aid:
                        type: string
                        description: The Android app ID.
                      c:
                        type: string
                        description: Country code.
                      d:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      u:
                        type: string
                        description: Android downloads.
                      r:
                        type: string
                        example: Android revenue.
                - type: array
                  description: Unified Response
                  items:
                    properties:
                      app_id:
                        type: string
                        description: The unified app ID.
                      country:
                        type: string
                        description: Country Code
                      date:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      android_units:
                        type: number
                        description: Android downloads.
                      android_revenue:
                        type: number
                        description: Android revenue.
                      ipad_units:
                        type: number
                        description: iPad downloads.
                      ipad_revenue:
                        type: number
                        description: iPad revenue.
                      iphone_units:
                        type: number
                        description: iPhone downloads.
                      iphone_revenue:
                        type: number
                        description: iPhone revenue.
                      unified_units:
                        type: number
                        description: Unified downloads.
                      unified_revenue:
                        type: number
                        description: Unified revenue.
              examples:
                ios:
                  summary: iOS Response
                  value:
                  - aid: 284882215
                    cc: AE
                    d: '2021-07-15T00:00:00Z'
                    au: 135
                    ar: 1815
                    iu: 1459
                    ir: 200438
                android:
                  summary: Android Response
                  value:
                  - aid: com.facebook.katana
                    c: AE
                    d: '2021-07-15T00:00:00Z'
                    u: 2163
                    r: 84500
                unified:
                  summary: Unified Response
                  value:
                  - app_id: 55c530a702ac64f9c0002dff
                    country: AE
                    date: '2021-07-15T00:00:00Z'
                    android_units: 3585
                    android_revenue: 84500
                    ipad_units: 135
                    ipad_revenue: 1815
                    iphone_units: 1705
                    iphone_revenue: 200438
                    unified_units: 5425
                    unified_revenue: 286753
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
