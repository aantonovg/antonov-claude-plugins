      - 'FEATURED: Featured App Rankings'
      description: 'Retrieve the featured creatives and their positions within the App and Google Play store over time. <br>
        <strong>Note:</strong> Some Feature Types are specific to the iOS App Store.

        '
      operationId: featured_creatives
      summary: Fetches featured creatives details of a particular app.
