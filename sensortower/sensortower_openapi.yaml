  /v1/{os}/store_summary:
    get:
      tags:
      - 'APPS: Store Summary'
      description: Retrieve aggregated download and revenue estimates of store categories by country and date. <br><br> <strong>Note:</strong>
        The latest day's available Google Play estimates may change. More data becomes available to us a day later and we
        use this data to recalibrate the estimate for increased accuracy. <br><br> <strong>Note:</strong> All revenues are
        returned in cents.
      operationId: store_summary
      summary: Fetches aggregated download and revenue estimates of store categories.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          type: string
      - description: IDs of the Categories, <a target='_blank' href='/api/docs/static/category_ids.json'>Category Ids</a>
          (use "categories" for multiples, separated by commas). Game categories are also supported, but the game_breakdown
          endpoint is recommended.
        in: query
        name: categories
        required: true
        explode: false
        example:
        - '6012'
        schema:
          items:
            default: ''
            type: string
          type: array
      - description: 'Specify the countries you want download / revenue for, separated by commas: <a target=''_blank'' href=''/api/ios/sales_report_estimates/countries''>Itunes
          Country Codes</a> /  <a target=''_blank'' href=''/api/android/sales_report_estimates/countries''>Android Country
          Codes</a> (use "WW" for worldwide).'
        in: query
        name: countries
        explode: false
        schema:
          items:
            default: ''
            type: string
          type: array
      - description: Aggregate estimates by granularity (use "daily", "weekly", "monthly", or "quarterly") defaults to "daily"
        in: query
        name: date_granularity
        required: true
        schema:
          default: daily
          enum:
          - daily
          - weekly
          - monthly
          - quarterly
          type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2021-07-15'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2021-07-20'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                anyOf:
                - type: array
                  description: iOS Response
                  items:
                    properties:
                      ca:
                        type: number
                        description: iOS category ID.
                      cc:
                        type: string
                        description: Country code.
                      d:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      au:
                        type: number
                        description: iPad downloads.
                      ar:
                        type: number
                        description: iPad revenue.
                      iu:
                        type: number
                        description: iPhone downloads.
                      ir:
                        type: number
                        description: iPhone revenue.
                - type: array
                  description: Android Response
                  items:
                    properties:
                      ca:
                        type: string
                        description: Android category ID.
                      cc:
                        type: string
                        description: Country code.
                      d:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      u:
                        type: number
                        description: Android downloads.
                      r:
                        type: number
                        description: Android revenue.
              examples:
                ios:
                  summary: iOS Response
                  value:
                  - ca: 6012
                    cc: AE
                    d: '2021-07-15T00:00:00Z'
                    au: 1073
                    ar: 21539
                    iu: 15077
                    ir: 1464385
                android:
                  summary: Android Response
                  value:
                  - ca: lifestyle
                    cc: AE
                    d: '2021-07-15T00:00:00Z'
                    u: 21658
                    r: 442186
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/ad_intel/top_apps:
    get:
      tags:
      - 'ADVERTISING: Top Advertisers and Ad Publishers'
      description: Fetches the current and prior Share of Voice for the top advertisers or publishers over a given time period.
      operationId: top_apps
      summary: Fetches the top advertisers or publishers over a given time period.
      parameters:
      - description: Operating System.
        in: path
        name: os
        required: true
        schema:
          default: unified
          enum:
          - ios
          - android
          - unified
          type: string
      - description: Advertisers or publishers.
        in: query
        name: role
        required: true
        schema:
          enum:
          - advertisers
          - publishers
          type: string
      - description: Start date for impression data, `YYYY-MM-DD` format.
        in: query
        name: date
        required: true
        example: '2023-01-01'
        schema:
          type: string
      - description: Time period to calculate Share of Voice.
        in: query
        name: period
        required: true
        schema:
          default: month
          enum:
          - week
          - month
          - quarter
          type: string
      - description: Category ID to return results for (<a target='_blank' href='/api/docs/static/category_ids.json'>Category
          Ids</a>). Use iOS categories for unified.
        in: query
        name: category
        required: true
        schema:
          type: string
        examples:
          ios/unified:
            value: 6005
            summary: Social Networking (iOS/Unified)
          android:
            value: social
            summary: Social (Android)
      - description: Country to return results for (<a target='_blank' href='/api/ios/ad_intel/countries.json'>Countries</a>).
        in: query
        name: country
        required: true
        schema:
          default: US
          type: string
      - description: Countries to filter results by. Available when role is advertisers. Accepts multiple country codes (<a
          target='_blank' href='/api/ios/ad_intel/countries.json'>Countries</a>). Takes priority over the country parameter
          when both are provided and role is advertisers.
        in: query
        name: countries
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - US
        - GB
        - CA
      - description: Network to return results for (<a target='_blank' href='/api/ios/ad_intel/networks.json'>Networks</a>).
        in: query
        name: network
        required: true
        example: Admob
        schema:
          type: string
          enum:
          - Adcolony
          - Admob
          - Apple Search Ads
          - Applovin
          - Chartboost
          - Instagram
          - Mopub
          - Pinterest
          - Snapchat
          - Supersonic
          - Tapjoy
          - TikTok
          - Unity
          - Vungle
          - Youtube
      - description: "Filter by Custom fields filter. <br> <br>Use filter ID from <a target='_blank'\n  href='/api/docs/custom_fields_metadata#/CUSTOM%20FIELDS%3A%20Custom%20Fields%20Filter%20ID/create_custom_fields_filter'>\n\
          \  relevant endpoint\n<a>."
        in: query
        name: custom_fields_filter_id
        schema:
          type: string
      - description: Limits the number of apps returned, maximum of 250.
        in: query
        name: limit
        required: false
        example: 25
        schema:
          enum:
          - 25
          - 100
          - 250
          type: integer
          maximum: 250
      - description: Page number. Total number of pages is returned in response field "pages".
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
