        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/sales_reports:
    get:
      tags:
      - 'CONNECTED APPS: My Sales Metrics'
      description: Retrieve downloads and revenue report of your apps by country and date. <br><br> All revenue is Net. All
        revenues are returned in cents. <br><br> <strong>Note:</strong> This is <strong><u>ONLY for your own apps</u></strong>
        that you connected to Sensor Tower via iTunes Connect or Google Play. <br><br> If you are looking for download and
        revenue <strong>estimates for competitor apps</strong>, please refer to the API documentation for the <a href="/api/docs/app_analysis#/PERFORMANCE%3A%20Downloads%20%26%20Revenue/sales_report_estimates">Store
        Intelligence Platform</a>.
      operationId: sales_report
      summary: Fetches downloads and revenue sales report of your apps.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          type: string
      - description: App IDs of apps that you currently manage, separated by commas
        in: query
        name: app_ids
        required: true
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: "Specify the countries you want download / revenue for, <a target='_blank' href='/api/ios/sales_reports/countries.json'>\n\
          \  Itunes Country Codes\n</a>, <a target='_blank' href='/api/android/sales_reports/countries.json'>\n  Android Country\
          \ Codes\n</a>, separated by commas (use \"WW\" for worldwide)"
        in: query
        name: countries
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Aggregate estimates by granularity (use "daily", "weekly", "monthly", or "quarterly") defaults to "daily"
        in: query
        name: date_granularity
        required: true
        schema:
          default: daily
          enum:
          - daily
          - weekly
          - monthly
          - quarterly
          type: string
      - description: Start Date, `YYYY-MM-DD` Format
        in: query
        name: start_date
        required: true
        example: '2024-01-10'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2024-01-20'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              examples:
                ios:
                  value: "[\n  {\n    \"app_id\": 1234567890,\n    \"country\": \"US\",\n    \"date\": \"2024-03-10T00:00:00Z\"\
                    ,\n    \"ipad_units\": 123,\n    \"iphone_units\": 234\n  },\n  {\n    \"app_id\": 1234567890,\n    \"\
                    country\": \"US\",\n    \"date\": \"2024-03-11T00:00:00Z\",\n    \"ipad_units\": 345,\n    \"iphone_units\"\
                    : 456\n  }\n]\n"
                android:
                  value: "[\n  {\n    \"app_id\": \"com.example.app\",\n    \"country\": \"US\",\n    \"date\": \"2024-03-10T00:00:00Z\"\
                    ,\n    \"daily_user_installs\": 100,\n    \"daily_device_installs\": 200,\n    \"active_device_installs\"\
                    : 100100\n  },\n  {\n    \"app_id\": \"com.example.app\",\n    \"country\": \"US\",\n    \"date\": \"\
                    2024-03-11T00:00:00Z\",\n    \"daily_user_installs\": 110,\n    \"daily_device_installs\": 150,\n    \"\
                    active_device_installs\": 100200\n  }\n]\n"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/unified/sales_reports:
    get:
      tags:
