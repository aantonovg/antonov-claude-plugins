          android:
            value: com.zhiliaoapp.musically
            summary: string (Android)
        schema:
          type: string
      - description: Search advertisers or publishers.
        in: query
        name: role
        required: true
        schema:
          enum:
          - advertisers
          - publishers
          type: string
      - description: Date to search, `YYYY-MM-DD` format.
        in: query
        name: date
        required: true
        example: '2023-01-01'
        schema:
          type: string
      - description: Time period to search.
        in: query
        name: period
        required: true
        schema:
          default: month
          enum:
          - week
          - month
          - quarter
          type: string
      - description: Category to search (<a target='_blank' href='/api/docs/static/category_ids.json'>Category Ids</a>). Use
