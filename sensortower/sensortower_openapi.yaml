  /v1/{os}/ad_intel/creatives:
    get:
      tags:
      - 'ADVERTISING: Creative Gallery'
      description: Fetches creatives for an advertising app and includes Share of Voice and top publishers for each creative.
      operationId: creatives
      summary: Fetches creatives for advertising apps.
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: unified
          enum:
          - ios
          - android
          - unified
          type: string
      - description: Apps to return creatives for, separated by commas.
        in: query
        name: app_ids
        required: true
        examples:
          unified:
            value:
            - 56cbbce9d48401b048003405
            summary: string (Unified)
          ios:
            value:
            - '835599320'
            summary: integer (iOS)
          android:
            value:
            - com.zhiliaoapp.musically
            summary: string (Android)
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Start date for creatives, `YYYY-MM-DD` format.
        in: query
        name: start_date
        required: true
        example: '2023-01-01'
        schema:
          type: string
          format: date
      - description: End date for creatives, `YYYY-MM-DD` format. (defaults to today)
        in: query
        name: end_date
        required: false
        example: '2023-01-31'
        schema:
          type: string
          format: date
      - description: Countries to return results for, separated by commas (<a target='_blank' href='/api/ios/ad_intel/countries.json'>Countries</a>).
        in: query
        name: countries
        required: true
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
        example:
        - US
      - description: 'Networks to return results for, separated by commas. List of networks: (<a target=''_blank'' href=''/api/ios/ad_intel/creative_networks.json''>ios
          networks</a>), (<a target=''_blank'' href=''/api/android/ad_intel/creative_networks.json''>android networks</a>),
          (<a target=''_blank'' href=''/api/unified/ad_intel/creative_networks.json''>unified networks</a>).'
        in: query
        name: networks
        required: true
        explode: false
        example:
        - Admob
        schema:
          items:
            type: string
            enum:
            - Adcolony
            - Admob
            - Applovin
            - Chartboost
            - Instagram
            - Mopub
            - Pinterest
            - Snapchat
            - Supersonic
            - Tapjoy
            - TikTok
            - Unity
            - Vungle
            - Youtube
          type: array
      - description: Ad types to include, separated by commas.
        in: query
        name: ad_types
        required: true
        explode: false
        example:
        - video
        schema:
          type: array
          items:
            type: string
            enum:
            - image
            - image-banner
            - image-interstitial
            - image-other
            - banner
            - full_screen
            - video
            - video-rewarded
            - video-interstitial
            - video-other
            - playable
            - interactive-playable
            - interactive-playable-rewarded
            - interactive-playable-other
      - description: Limits the number of creatives returned, maximum of 100.
        in: query
        name: limit
        required: false
        example: 10
        schema:
          maximum: 100
          enum:
          - 10
          - 50
          - 100
          type: integer
      - description: Page number. Total number of pages can be calculated by dividing "count" from response by limit size.
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
      - description: Display breakdown flags. Control if breakdown fields (breakdown and top_publishers) displays in ad unit.
        in: query
        name: display_breakdown
        required: false
        schema:
          default: true
          type: boolean
      - description: Ad placement(s) to include, separated by commas.
        in: query
        name: placements
        required: false
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - ad_on_reel
            - feed
            - marketplace
            - player
            - reel
            - search
            - story
            - other
      - description: The video durations to include, separated by commas. To filter video durations using ranges, one can
          specify the start and end points of each range in seconds, separated by a colon. For instance, `10:30` would filter
          videos longer than 10 seconds but 30 seconds or shorter. Multiple ranges can be applied simultaneously, with the
          logic that a video's duration only needs to meet the criteria of one range to be included. Open-ended ranges are
          also possible, where only one end of the range is specified, such as `:3` to include videos up to 3 seconds long,
          or `60:` for videos longer than 60 seconds.
        in: query
        name: video_durations
        required: false
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Specify the aspect ratios to include, separated by commas. This applies to all creative ad types except
          banners; for banners this parameter is ignored. The parameter can accept one or more values from a predefined set
          of common aspect ratios available. Aspect ratio sets are used as buckets, grouping creatives that might not fit
          the ratio fully, as we assume a small margin of error while computing the exact width and height
        in: query
        name: aspect_ratios
        required: false
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - '9:16'
            - '4:5'
            - '1:1'
            - 1.91:1
            - '16:9'
            - '2:3'
            - other
      - description: Specify the banner dimensions to include, separated by commas. This applies to banner creatives only;
          this parameter will be ignored for the creatives of other ad types. The parameter can accept one or more values
          from a predefined set.
        in: query
        name: banner_dimensions
        required: false
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - 970x250
            - 728x90
            - 350x110
            - 320x50
            - other
      - description: New creative flag. If the parameter's value is 'true', the endpoint will return new creatives only. The
          new creatives are creatives which are first seen in requested date range.
        in: query
        name: new_creative
        required: false
        schema:
          default: false
          type: boolean
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
