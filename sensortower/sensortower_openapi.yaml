  /v1/{os}/ad_intel/creatives/top:
    get:
      tags:
      - 'ADVERTISING: Top Creatives'
      description: Fetches the top creatives over a given time period.
      operationId: top_creatives
      summary: Fetches the top creatives over a given time period.
      parameters:
      - description: Operating System.
        in: path
        name: os
        required: true
        schema:
          default: unified
          enum:
          - ios
          - android
          - unified
          type: string
      - description: Start date for creatives data, `YYYY-MM-DD` format.
        in: query
        name: date
        required: true
        example: '2023-01-01'
        schema:
          type: string
      - description: Time period for creatives data.
        in: query
        name: period
        required: true
        schema:
          default: month
          enum:
          - week
          - month
          - quarter
          type: string
      - description: Category ID to return results for (<a target='_blank' href='/api/docs/static/category_ids.json'>Category
          Ids</a>). Use iOS categories for unified.
        in: query
        name: category
        required: true
        schema:
          type: string
        examples:
          ios/unified:
            value: 6005
            summary: Social Networking (iOS/Unified)
          android:
            value: social
            summary: Social (Android)
      - description: Country to return results for (<a target='_blank' href='/api/ios/ad_intel/countries.json'>Countries</a>).
        in: query
        name: country
        required: true
        schema:
          default: US
          type: string
      - description: 'Network to return results for. List of networks: (<a target=''_blank'' href=''/api/ios/ad_intel/creative_networks.json''>ios
          networks</a>), (<a target=''_blank'' href=''/api/android/ad_intel/creative_networks.json''>android networks</a>),
          (<a target=''_blank'' href=''/api/unified/ad_intel/creative_networks.json''>unified networks</a>).'
        in: query
        name: network
        required: true
        example: Youtube
        schema:
          type: string
          enum:
          - Adcolony
          - Admob
          - Applovin
          - Chartboost
          - Instagram
          - Mopub
          - Pinterest
          - Snapchat
          - Supersonic
          - Tapjoy
          - TikTok
          - Unity
          - Vungle
          - Youtube
      - description: Ad types to include, separated by commas.
        in: query
        name: ad_types
        required: true
        explode: false
        example:
        - video
        schema:
          type: array
          items:
            type: string
            enum:
            - image
            - image-banner
            - image-interstitial
            - image-other
            - banner
            - full_screen
            - video
            - video-rewarded
            - video-interstitial
            - video-other
            - playable
            - interactive-playable
            - interactive-playable-rewarded
            - interactive-playable-other
      - description: Limits the number of apps returned, maximum of 250.
        in: query
        name: limit
        required: false
        example: 25
        schema:
          enum:
          - 25
          - 100
          - 250
          type: integer
          maximum: 250
      - description: Page number. Total number of pages can be calculated by dividing "count" from response by limit size.
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
      - description: Ad placement(s) to include, separated by commas.
        in: query
        name: placements
        required: false
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - ad_on_reel
            - feed
            - marketplace
            - player
            - reel
            - search
            - story
            - other
      - description: The video durations to include, separated by commas. To filter video durations using ranges, one can
          specify the start and end points of each range in seconds, separated by a colon. For instance, `10:30` would filter
          videos longer than 10 seconds but 30 seconds or shorter. Multiple ranges can be applied simultaneously, with the
          logic that a video's duration only needs to meet the criteria of one range to be included. Open-ended ranges are
          also possible, where only one end of the range is specified, such as `:3` to include videos up to 3 seconds long,
          or `60:` for videos longer than 60 seconds.
        in: query
        name: video_durations
        required: false
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Specify the aspect ratios to include, separated by commas. This applies to all creative ad types except
          banners; for banners this parameter is ignored. The parameter can accept one or more values from a predefined set
          of common aspect ratios available. Aspect ratio sets are used as buckets, grouping creatives that might not fit
          the ratio fully, as we assume a small margin of error while computing the exact width and height
        in: query
        name: aspect_ratios
        required: false
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - '9:16'
            - '4:5'
            - '1:1'
            - 1.91:1
            - '16:9'
            - '2:3'
            - other
      - description: Specify the banner dimensions to include, separated by commas. This applies to banner creatives only;
          this parameter will be ignored for the creatives of other ad types. The parameter can accept one or more values
          from a predefined set.
        in: query
        name: banner_dimensions
        required: false
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - 970x250
            - 728x90
            - 350x110
            - 320x50
            - other
      - description: New creative flag. If the parameter's value is 'true', the endpoint will return new creatives only. The
          new creatives are creatives which are first seen in requested date range.
        in: query
        name: new_creative
        required: false
        schema:
          default: false
          type: boolean
      responses:
        '200':
          description: <strong>Success.</strong>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/{os}/games_breakdown:
    get:
      tags:
      - 'GAMES: Game Summary'
      summary: Fetches aggregated download and revenue estimates of game categories.
      description: Retrieve aggregated download and revenue estimates of game categories by country and date. <a target='blank'
        href='/api/docs/static/games_breakdown_key.json'>Game Summary Response Key</a> <br><br> <strong>Note:</strong> The
        latest day's available Google Play estimates may change. More data becomes available to us a day later and we use
        this data to recalibrate the estimate for increased accuracy. <br><br> <strong>Note:</strong> All revenues are returned
        in cents.
      operationId: games_breakdown
      parameters:
      - description: Operating System
        in: path
        name: os
        required: true
        schema:
          default: ios
          enum:
          - ios
          - android
          type: string
      - description: IDs of Game Categories, <a target='_blank' href='/api/docs/static/category_ids.json'>Category Ids</a>
          (use "categories" for multiples, separated by commas). Play and the App Store use completely different game category
          IDs.
        in: query
        name: categories
        required: true
        explode: false
        example:
        - '7001'
        schema:
          items:
            default: ''
            type: string
          type: array
      - description: 'Specify the countries you want download / revenue for, separated by commas: <a target=''_blank'' href=''/api/ios/sales_report_estimates/countries''>Itunes
          Country Codes</a> /  <a target=''_blank'' href=''/api/android/sales_report_estimates/countries''>Android Country
          Codes</a> (use "WW" for worldwide).'
        in: query
        name: countries
        explode: false
        schema:
          items:
            default: ''
            type: string
          type: array
      - description: Aggregate estimates by granularity (use "daily", "weekly", "monthly", or "quarterly") defaults to "daily"
        in: query
        name: date_granularity
        required: true
        schema:
          default: daily
          enum:
          - daily
          - weekly
          - monthly
          - quarterly
          type: string
      - description: Start Date, `YYYY-MM-DD` Format. Data before 2016-01-01 is not supported.
        in: query
        name: start_date
        required: true
        example: '2021-01-01'
        schema:
          type: string
          format: date
      - description: End Date, `YYYY-MM-DD` Format
        in: query
        name: end_date
        required: true
        example: '2021-01-07'
        schema:
          type: string
          format: date
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              schema:
                anyOf:
                - type: array
                  description: iOS Response
                  items:
                    properties:
                      ca:
                        type: number
                        description: iOS game category ID.
                      cc:
                        type: string
                        description: Country code.
                      d:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      au:
                        type: number
                        description: iPad downloads.
                      ar:
                        type: number
                        description: iPad revenue.
                      iu:
                        type: number
                        description: iPhone downloads.
                      ir:
                        type: number
                        description: iPhone revenue.
                - type: array
                  description: Android Response
                  items:
                    properties:
                      ca:
                        type: string
                        description: Android game category ID.
                      cc:
                        type: string
                        description: Country code.
                      d:
                        type: string
                        format: date-time
                        description: Metric observation date.
                      u:
                        type: number
                        description: Android downloads.
                      r:
                        type: number
                        description: Android revenue.
              examples:
                ios:
                  summary: iOS Response
                  value:
                  - ca: 7001
                    cc: AE
                    d: '2021-01-01T00:00:00Z'
                    au: 20894
                    ar: 2473155
                    iu: 29534
                    ir: 11238229
                android:
                  summary: Android Response
                  value:
                  - ca: game_action
                    cc: AE
                    d: '2021-01-01T00:00:00Z'
                    u: 46684
                    r: 9878620
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
