        that you connected to Sensor Tower via iTunes Connect or Google Play. <br><br> If you are looking for download and
        revenue <strong>estimates for competitor apps</strong>, please refer to the API documentation for the <a href="/api/docs/app_analysis#/PERFORMANCE%3A%20Downloads%20%26%20Revenue/sales_report_estimates">Store
        Intelligence Platform</a>.'
      operationId: unified_sales_report
      summary: Fetches unified downloads and revenue sales report of your apps.
      parameters:
      - description: Unified App IDs of apps that you currently manage, separated by commas
        in: query
        name: unified_app_ids
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: App IDs of Itunes apps that you currently manage, separated by commas
        in: query
        name: itunes_app_ids
        explode: false
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: Android App IDs of apps that you currently manage, separated by commas
        in: query
        name: android_app_ids
        explode: false
        schema:
          type: array
