  /v1/apps/timeseries:
    get:
      tags:
      - 'USAGE: Session Metrics (Time Spent, Session Count)'
      description: "Retrieve session metrics data across a time series for Android or iOS apps. <br><br> Supported metrics\
        \ include:\n  - time_spent (seconds)\n  - total_time_spent (seconds)\n  - session_duration (seconds)\n  - session_count\n\
        \  - total_session_count"
      operationId: session_metrics_timeseries
      summary: Fetch time series data for non-unified apps.
      parameters:
      - description: Start Date in `YYYY-MM-DD` format. Data is available from 2021-01-01 onward.
        in: query
        name: start_date
        required: true
        schema:
          default: '2023-01-01'
          format: date
          type: string
      - description: End Date in `YYYY-MM-DD` format.
        in: query
        name: end_date
        required: true
        schema:
          default: '2023-02-01'
          format: date
          type: string
      - description: App IDs, separated by commas (maximum 100).
        in: query
        name: app_ids
        required: true
        explode: false
        schema:
          type: array
          maxItems: 100
          items:
            default: ''
            type: string
        example:
        - com.facebook.katana
        - com.instagram.android
      - description: Time series metrics, separated by commas.
        in: query
        name: timeseries
        required: true
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - time_spent
            - total_time_spent
            - session_duration
            - session_count
            - total_session_count
        example:
        - date
        - time_spent
        - total_time_spent
        - session_duration
        - session_count
        - total_session_count
      - description: 'Regions, separated by commas. All regions are included unless specified. <a target=''_blank'' href=''/api/ios/usage/countries.json''>Region
          Codes</a>.

          '
        in: query
        name: regions
        explode: false
        example:
        - US
        - FR
        schema:
          type: array
          items:
            default: ''
            type: string
      - description: 'Specifies the session metrics time period.<br> Returns averaged session metrics for each period within
          a month.<br> Example: "week" = average session metrics per week, averaged over all weeks in a month.

          '
        name: time_period
        required: true
        in: query
        example: week
        schema:
          type: string
          enum:
          - day
          - week
          - month
      - description: 'Fields used for data aggregation, separated by commas.<br> The specified fields will be preserved in
          the response, while others will be aggregated.

          '
        in: query
        name: breakdown
        required: true
        explode: false
        schema:
          default: app_id
          type: string
          enum:
          - app_id
          - app_id,region
      responses:
        '200':
          description: <strong>Success.</strong>
          content:
            application/json:
              examples:
                apps:
                  value: "{\n  \"unified_apps\": [\n    {\n      \"unified_app_id\": \"com.facebook.katana\",\n      \"timeseries\"\
                    : [\n        {\n          \"date\": \"2023-01-01\",\n          \"time_spent\": 26551.594982,\n       \
                    \   \"total_time_spent\": 13149282008467.77,\n          \"session_duration\": 314.498895,\n          \"\
                    session_count\": 84.423601,\n          \"total_session_count\": 41809463799.98541\n        },\n      \
