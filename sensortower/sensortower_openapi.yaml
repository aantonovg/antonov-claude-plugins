      - description: Comparison Attribute (use "units" or "revenue")
        in: query
        name: measure
        required: true
        schema:
          default: units
          enum:
          - units
          - revenue
          type: string
      - description: Device Type <br> use "iphone", "ipad", or "total" for `ios`, <br> leave blank for `Android`, <br> use
          "total" for `unified`
        in: query
        name: device_type
        schema:
          default: total
          enum:
          - iphone
          - ipad
          - total
          type: string
        examples:
          ios:
            value: total
            summary: iOS
          android:
            value: ''
            summary: Android
      - description: ID of the Category, <a target='_blank' href='/api/docs/static/category_ids.json'>Category Ids</a>
        in: query
        name: category
